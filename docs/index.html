<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta
      id="viewport-meta"
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" />
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <title>台灣警政「風紀類」輿情蒐報系統</title>
    <meta
      name="description"
      content="台灣警政「風紀類」輿情蒐報系統，提供風紀類輿情新聞搜尋、分類與條列瀏覽。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="is-locked">
    <div id="auth-overlay" class="auth-overlay" role="dialog" aria-modal="true" aria-label="登入">
      <section class="auth-card">
        <form id="auth-form" class="auth-form" autocomplete="off">
          <input
            id="auth-password"
            name="password"
            type="password"
            inputmode="none"
            placeholder="請輸入密碼"
            autocomplete="current-password"
            aria-label="登入密碼"
            readonly
            required
          />
          <div class="auth-pad" role="group" aria-label="密碼鍵盤">
            <button class="auth-key" type="button" data-key="1">1</button>
            <button class="auth-key" type="button" data-key="2">2</button>
            <button class="auth-key" type="button" data-key="3">3</button>
            <button class="auth-key" type="button" data-key="4">4</button>
            <button class="auth-key" type="button" data-key="5">5</button>
            <button class="auth-key" type="button" data-key="6">6</button>
            <button class="auth-key" type="button" data-key="7">7</button>
            <button class="auth-key" type="button" data-key="8">8</button>
            <button class="auth-key" type="button" data-key="9">9</button>
            <button class="auth-key auth-key--subtle" type="button" data-action="backspace">刪除</button>
            <button class="auth-key" type="button" data-key="0">0</button>
            <button id="auth-submit" class="auth-button auth-key auth-key--confirm" type="submit">確認</button>
          </div>
        </form>
        <p id="auth-message" class="auth-message" aria-live="polite"></p>
      </section>
    </div>

    <noscript>
      <div class="noscript-banner">本系統需啟用 JavaScript 才能完成登入驗證與內容保護。</div>
    </noscript>

    <div id="protected-app" class="page-shell protected-shell">
      <header class="site-header">
        <h1 class="site-title">台灣警政「風紀類」輿情蒐報系統</h1>
        <p class="ownership">北市警局督察室風紀股余股長製</p>
        <p class="header-meta">
          <span>已收錄 <strong id="article-count">0</strong> 則</span>
          <span>最近更新 <strong id="last-updated">載入中</strong></span>
        </p>
      </header>

      <main class="layout">
        <section class="controls">
          <div class="controls-top">
            <button
              id="search-toggle"
              class="search-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="search-panel"
            >
              展開搜尋
            </button>
          </div>

          <div class="tag-strip">
            <span>快速標籤</span>
            <div id="tag-filters" class="tags"></div>
          </div>

          <div id="search-panel" class="search-panel" hidden>
            <div class="control-row">
              <label class="field">
                <span>搜尋新聞</span>
                <input
                  id="search-input"
                  type="search"
                  placeholder="例如：板橋、收賄、酒駕、分局、包庇"
                />
              </label>

              <label class="field">
                <span>媒體來源</span>
                <select id="source-filter">
                  <option value="all">全部來源</option>
                </select>
              </label>

              <label class="field">
                <span>排序方式</span>
                <select id="sort-select">
                  <option value="newest">最新優先</option>
                  <option value="oldest">最舊優先</option>
                  <option value="source">依來源排序</option>
                </select>
              </label>
            </div>

            <div class="meta-note">
              資料來源為 Google News RSS 搜尋結果，再依台灣媒體來源名稱進行過濾。
              內容適合做監測與索引，引用前請回到原始新聞頁面確認。
            </div>
          </div>
        </section>

        <section class="results">
          <div class="results-head">
            <h2>新聞列表</h2>
            <p id="results-summary">讀取資料中...</p>
          </div>
          <div id="results" class="results-grid"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
