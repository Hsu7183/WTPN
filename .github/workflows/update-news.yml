name: Update News Index

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Client request identifier
        required: false
        type: string
      trigger_source:
        description: Trigger source
        required: false
        type: string
  schedule:
    - cron: "*/20 * * * *"

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Refresh news dataset
        run: python scrape_news.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(data): refresh news index"
          git push
